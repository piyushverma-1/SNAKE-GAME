<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
</head>
<link rel="stylesheet" href="style.css">
<body>

    <div class="main">
        <section class="controler">
            <h3>High Score: <span id="high-score">00</span></h3>
            <h3>Score: <span id="score">00</span></h3>
            <h3>Time: <span id="time">01</span>
        </section>
    
        <div class="board">
            
        </div>
    </div>

    <div class="modal">
        <div class="start-game">
            <h2>Welcome to the SNAKE-LADDER GAME........</h2>
            <button class="btn btn-start">Start Game</button>
        </div>
        <div class="play-again" style="display: none;">
            <h2>Play Again........</h2>
            <button class="btn btn-end">Play Again</button>
        </div>
    </div>


    <script src="app.js"></script>
</body>
</html>
